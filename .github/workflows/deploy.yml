name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

# Placeholder deploy workflow. Real Vercel + Fly.io deploys land in T-EP01-014.
# Steps are valid but no-op until secrets and tokens are configured.

jobs:
  build:
    name: Build artifacts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build

  deploy-vercel:
    name: Deploy Next.js apps to Vercel
    runs-on: ubuntu-latest
    needs: build
    if: false # enable when VERCEL_TOKEN is configured
    strategy:
      matrix:
        app: [operator-app, tom-app, tim-app]
    steps:
      - uses: actions/checkout@v4
      - name: Pull Vercel env
        run: echo "Would run: vercel pull --yes --environment=production --token=$VERCEL_TOKEN"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      - name: Build & deploy
        run: echo "Would run: vercel deploy --prebuilt --prod --token=$VERCEL_TOKEN"

  deploy-fly:
    name: Deploy workers + MCP to Fly.io
    runs-on: ubuntu-latest
    needs: build
    if: false # enable when FLY_API_TOKEN is configured
    strategy:
      matrix:
        app:
          - tom-mcp
          - tim-mcp
          - worker-extractor
          - worker-ontology
          - worker-engine
          - worker-notifier
          - worker-tuner
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - name: Deploy
        run: echo "Would run: flyctl deploy --remote-only --app vita-${{ matrix.app }}"
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
